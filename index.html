<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yamin Al Amin | Bulk Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: '#3b82f6',
                        dark: '#0f172a',
                        darker: '#020617'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-darker text-gray-200 min-h-screen font-sans antialiased selection:bg-brand selection:text-white">
    <div class="max-w-4xl mx-auto p-6 md:p-12">
        
        <header class="flex items-center space-x-4 mb-10 border-b border-gray-800 pb-6">
            <img src="https://yaminalamin.com/favicon.ico" alt="Yamin Al Amin Logo" 
                 onerror="this.src='https://ui-avatars.com/api/?name=Yamin+Al+Amin&background=0f172a&color=fff'" 
                 class="w-12 h-12 rounded-lg shadow-lg object-cover bg-dark">
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight">Yamin Al Amin</h1>
                <p class="text-sm text-gray-400">Bulk Messaging Protocol via Resend</p>
            </div>
        </header>

        <main class="bg-dark border border-gray-800 rounded-xl p-6 md:p-8 shadow-2xl">
            
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Resend API Key</label>
                    <input type="password" id="apiKey" placeholder="re_xxxxxxxxxxxxxxxxx" 
                           class="w-full bg-darker border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-colors">
                    <p class="text-xs text-gray-500 mt-2">Your key is kept securely in your browser and is never saved to the server.</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Upload Contact Sheet (CSV)</label>
                    <div class="flex items-center justify-center w-full">
                        <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-gray-700 border-dashed rounded-lg cursor-pointer bg-darker hover:border-brand hover:bg-gray-900 transition-all">
                            <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                <svg class="w-8 h-8 mb-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                                <p class="mb-2 text-sm text-gray-400"><span class="font-semibold">Click to upload</span> or drag and drop</p>
                                <p class="text-xs text-gray-500">Requires headers: name, gmail, msg</p>
                            </div>
                            <input id="csvFile" type="file" class="hidden" accept=".csv" />
                        </label>
                    </div>
                </div>

                <div id="previewContainer" class="hidden mt-8">
                    <h3 class="text-lg font-medium text-white mb-4 flex justify-between items-center">
                        <span>Data Preview</span>
                        <span id="rowCount" class="text-sm bg-gray-800 px-3 py-1 rounded-full text-gray-300">0 rows</span>
                    </h3>
                    <div class="overflow-x-auto rounded-lg border border-gray-700">
                        <table class="w-full text-sm text-left text-gray-300">
                            <thead class="text-xs text-gray-400 uppercase bg-gray-800 border-b border-gray-700">
                                <tr>
                                    <th class="px-6 py-3">Name</th>
                                    <th class="px-6 py-3">Email (gmail)</th>
                                    <th class="px-6 py-3">Message</th>
                                    <th class="px-6 py-3">Status</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" class="divide-y divide-gray-800">
                                </tbody>
                        </table>
                    </div>

                    <button id="sendBtn" class="mt-6 w-full bg-white text-black hover:bg-gray-200 font-semibold py-3 px-6 rounded-lg transition-colors flex justify-center items-center">
                        Launch Bulk Campaign
                    </button>
                </div>

            </div>
        </main>
    </div>

    <script>
        let emailData = [];
        const fileInput = document.getElementById('csvFile');
        const tableBody = document.getElementById('tableBody');
        const previewContainer = document.getElementById('previewContainer');
        const sendBtn = document.getElementById('sendBtn');
        const rowCount = document.getElementById('rowCount');

        // Handle File Upload & Parsing
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    emailData = results.data;
                    renderTable();
                }
            });
        });

        // Render Data in Table
        function renderTable() {
            tableBody.innerHTML = '';
            
            if(emailData.length > 0) {
                previewContainer.classList.remove('hidden');
                rowCount.innerText = `${emailData.length} contacts loaded`;
            }

            emailData.forEach((row, index) => {
                const tr = document.createElement('tr');
                tr.className = "bg-darker hover:bg-gray-900 transition-colors";
                tr.innerHTML = `
                    <td class="px-6 py-4 font-medium text-white">${row.name || '-'}</td>
                    <td class="px-6 py-4 text-brand">${row.gmail || '-'}</td>
                    <td class="px-6 py-4 truncate max-w-xs">${row.msg || '-'}</td>
                    <td class="px-6 py-4">
                        <span id="status-${index}" class="text-gray-500 text-xs font-semibold px-2 py-1 rounded bg-gray-800">Pending</span>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        }

        // Handle Sending Logic
        sendBtn.addEventListener('click', async function() {
            const apiKey = document.getElementById('apiKey').value;
            if (!apiKey) {
                alert("Please enter your Resend API Key.");
                return;
            }

            sendBtn.disabled = true;
            sendBtn.innerText = "Sending in progress...";
            sendBtn.classList.add('opacity-50', 'cursor-not-allowed');

            for (let i = 0; i < emailData.length; i++) {
                const row = emailData[i];
                const statusBadge = document.getElementById(`status-${i}`);
                
                if (!row.gmail || !row.msg) {
                    updateStatus(statusBadge, 'Skipped (Missing Data)', 'bg-yellow-900/50 text-yellow-500');
                    continue;
                }

                updateStatus(statusBadge, 'Sending...', 'bg-blue-900/50 text-blue-400');

                try {
                    const response = await fetch('https://api.resend.com/emails', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${apiKey}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            from: 'Yamin Al Amin <hello@yaminalamin.com>',
                            to: [row.gmail.trim()],
                            subject: 'Message from Yamin Al Amin',
                            html: `<p>Hi ${row.name || 'there'},</p><p>${row.msg.replace(/\n/g, '<br>')}</p>`
                        })
                    });

                    if (response.ok) {
                        updateStatus(statusBadge, 'Sent', 'bg-green-900/50 text-green-400');
                    } else {
                        const err = await response.json();
                        updateStatus(statusBadge, 'Failed', 'bg-red-900/50 text-red-400');
                        console.error('Resend Error:', err);
                    }
                } catch (error) {
                    updateStatus(statusBadge, 'Error', 'bg-red-900/50 text-red-400');
                    console.error('Fetch Error:', error);
                }

                // Small delay to prevent hitting API rate limits instantly
                await new Promise(resolve => setTimeout(resolve, 500));
            }

            sendBtn.innerText = "Campaign Complete";
        });

        function updateStatus(element, text, classes) {
            element.className = `text-xs font-semibold px-2 py-1 rounded ${classes}`;
            element.innerText = text;
        }
    </script>
</body>
</html>
